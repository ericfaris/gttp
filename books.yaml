# Seed catalog. Each book fans out over `subreddits` using `queries`, where
# {title} is substituted with the book title. Add books with `gttp add "<title>"`
# or edit this file directly.

defaults:
  subreddits:
    - BettermentBookClub
    - DecidingToBeBetter
    - getdisciplined
    - productivity
    - selfimprovement
    - books
  queries:
    - '{title} summary'
    - '{title} key takeaways'
    - '{title} in a nutshell'
    - '{title} main points'
  # Filtering thresholds applied before ranking.
  min_score: 10
  min_chars: 400
  max_threads_per_book: 40
  # How many top-ranked threads feed synthesis.
  synthesis_top_n: 5

books:
  - title: Atomic Habits
    author: James Clear
  - title: Deep Work
    author: Cal Newport
  - title: The 7 Habits of Highly Effective People
    author: Stephen R. Covey
  - title: The Happiness Trap
    author: Russ Harris
  - title: Never Split the Difference
    author: Chris Voss
  - title: Thinking, Fast and Slow
    author: Daniel Kahneman
  - title: Influence
    author: Robert Cialdini
  - title: No More Mr. Nice Guy
    author: Robert Glover
  - title: Why Has Nobody Told Me This Before?
    author: Julie Smith
  - title: Boundaries
    author: Henry Cloud and John Townsend
  - title: Eat That Frog!
    author: Brian Tracy
  - title: Tiny Experiments
    author: Anne-Laure Le Cunff
  - title: Ego Is the Enemy
    author: Ryan Holiday
  - title: Grit
    author: Angela Duckworth
  - title: The Magic of Thinking Big
    author: David J. Schwartz
  - title: Mindset
    author: Carol Dweck
  - title: The Courage to Be Disliked
    author: Ichiro Kishimi and Fumitake Koga
  - title: Meditations
    author: Marcus Aurelius
  - title: How to Begin
    author: Michael Bungay Stanier
  - title: Why We Sleep
    author: Matthew Walker
