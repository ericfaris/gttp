name: Build and publish gttp

# Runs the online build (Reddit + Claude) and publishes site/ to GitHub Pages.
# Trigger manually from the Actions tab, or on the weekly schedule.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — books don't change often

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Build site
        # CI builds offline: live Reddit needs a real (headed) browser, which a
        # headless datacenter runner can't provide, and Reddit blocks such IPs
        # anyway. This publishes from bundled fixtures + cached pages; live
        # refreshes happen on the self-hosted container (see README).
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: gttp build --offline

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
